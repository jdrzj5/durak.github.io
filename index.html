<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dureń – Gracz vs Bot (pełne zasady Podkidnoy)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        body {
            margin: 0; padding: 0;
            background: #0a3d1f; color: #fff;
            font-family: 'Press Start 2P', cursive;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; flex-direction: column;
        }
        
        #game {
            width: 980px; background: #0a3d1f;
            border: 8px solid #ffcc00; border-radius: 15px;
            padding: 20px; box-shadow: 0 0 30px #ffcc00;
        }
        
        header { text-align: center; margin-bottom: 15px; }
        h1 { font-size: 28px; color: #ffcc00; text-shadow: 3px 3px #000; }
        
        .area {
            display: flex; justify-content: space-between;
            margin: 15px 0; padding: 10px;
            background: rgba(0,0,0,0.4); border-radius: 10px;
        }
        
        .card {
            width: 70px; height: 100px; background: white;
            border: 3px solid #222; border-radius: 8px;
            position: relative; display: inline-flex;
            flex-direction: column; align-items: center; justify-content: center;
            font-size: 24px; margin: 5px;
            box-shadow: 3px 3px 8px rgba(0,0,0,0.6);
            cursor: pointer; transition: all 0.3s ease;
            user-select: none;
        }
        
        .card:hover { transform: scale(1.12) rotate(3deg); }
        .card.red { color: #c00; } .card.black { color: #111; }
        
        .card .rank { position: absolute; top: 5px; left: 5px; font-size: 18px; font-weight: bold; }
        .card .suit { font-size: 42px; }
        .card .rank-bottom { position: absolute; bottom: 5px; right: 5px; font-size: 18px; font-weight: bold; transform: rotate(180deg); }
        
        .card-back {
            width: 70px; height: 100px;
            background: linear-gradient(45deg, #222, #444);
            border: 3px solid #ffcc00; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            color: #ffcc00; font-size: 30px;
            box-shadow: 3px 3px 8px rgba(0,0,0,0.6);
        }
        
        #table {
            background: #1a5c2f; padding: 20px;
            border-radius: 12px; min-height: 240px;
        }
        
        #table-pairs {
            display: flex; gap: 25px; flex-wrap: wrap;
            justify-content: center; margin: 15px 0;
        }
        
        .pair {
            display: flex; flex-direction: column;
            align-items: center; gap: 8px;
            background: rgba(255,255,255,0.1); padding: 8px;
            border-radius: 10px; border: 2px solid transparent;
            transition: all 0.3s;
        }
        
        .pair.selected { border-color: #ffcc00; box-shadow: 0 0 15px #ffcc00; }
        
        .pair-label { font-size: 12px; color: #ffcc00; }
        
        #player-hand {
            display: flex; flex-wrap: wrap; justify-content: center;
            gap: 8px; margin-top: 10px; padding: 15px;
            background: rgba(0,0,0,0.5); border-radius: 12px;
        }
        
        .info { font-size: 16px; text-align: center; margin: 10px 0; }
        
        button {
            background: #ffcc00; color: #000; border: none;
            padding: 12px 24px; font-family: 'Press Start 2P', cursive;
            font-size: 16px; cursor: pointer; margin: 8px;
            border-radius: 6px; box-shadow: 3px 3px #000;
        }
        
        button:hover { background: #ffdd33; }
        
        #status {
            font-size: 20px; color: #ffcc00;
            text-align: center; min-height: 30px;
            text-shadow: 2px 2px #000; margin: 10px 0;
        }
        
        .win {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.9);
            display: none; align-items: center; justify-content: center;
            flex-direction: column; font-size: 42px; color: #ffcc00; z-index: 100;
        }
    </style>
</head>
<body>
    <div id="game">
        <header>
            <h1>♦ DUREŃ (PODKIDNOY) ♦</h1>
            <p>Pełne zasady – atakujący może dorzucać po udanej obronie</p>
        </header>

        <div class="area">
            <div id="trump-area"><span>ATUT:</span><div id="trump-card" class="card"></div></div>
            <div id="deck-area"><span>TALIA: <span id="deck-count">24</span></span><div class="card-back">🂠</div></div>
        </div>

        <div class="info"><strong>BOT ma <span id="bot-count">6</span> kart</strong></div>
        <div style="text-align:center; margin:10px;"><div id="bot-hand" style="display:flex; justify-content:center; gap:5px;"></div></div>

        <div id="table">
            <div id="status">Twoja tura – atakuj!</div>
            <div id="table-pairs"></div>
        </div>

        <div id="player-hand"></div>

        <div style="text-align:center;" id="action-buttons"></div>
    </div>

    <div id="win-screen" class="win">
        <div id="win-text"></div>
        <button onclick="restartGame()" style="margin-top:30px; padding:15px 40px; font-size:20px;">JESZCZE RAZ</button>
    </div>

    <script>
        const ranks = ['6','7','8','9','10','J','Q','K','A'];
        const suits = ['♥','♦','♣','♠'];
        const rankValues = {'6':0,'7':1,'8':2,'9':3,'10':4,'J':5,'Q':6,'K':7,'A':8};

        let deck = [], playerHand = [], botHand = [];
        let trumpCard = null, trumpSuit = '';
        let tablePairs = []; // [{attack, defense: null or card}]
        let isPlayerAttacker = true;
        let gameOver = false;
        let selectedPairIndex = -1;
        let maxAttackCards = 6;

        function createDeck() {
            deck = [];
            for (let suit of suits) for (let rank of ranks) deck.push({rank, suit});
            shuffle(deck);
            playerHand = deck.splice(0, 6);
            botHand = deck.splice(0, 6);
            trumpCard = deck.pop();
            trumpSuit = trumpCard.suit;
            deck.push(trumpCard);
        }

        function shuffle(array) {
            for (let i = array.length-1; i>0; i--) {
                const j = Math.floor(Math.random()*(i+1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function canBeat(attack, defense) {
            if (!attack || !defense) return false;
            if (attack.suit === defense.suit) return rankValues[defense.rank] > rankValues[attack.rank];
            return defense.suit === trumpSuit && (attack.suit !== trumpSuit || rankValues[defense.rank] > rankValues[attack.rank]);
        }

        function getCardHTML(card, isBack = false) {
            if (isBack) return `<div class="card-back">🂠</div>`;
            const color = (card.suit==='♥'||card.suit==='♦') ? 'red' : 'black';
            return `<div class="card ${color}"><div class="rank">${card.rank}</div><div class="suit">${card.suit}</div><div class="rank-bottom">${card.rank}</div></div>`;
        }

        function render() {
            if (gameOver) return;

            document.getElementById('trump-card').innerHTML = getCardHTML(trumpCard);
            document.getElementById('deck-count').textContent = deck.length;
            document.getElementById('bot-count').textContent = botHand.length;

            // bot backi
            const botDiv = document.getElementById('bot-hand');
            botDiv.innerHTML = '';
            for (let i = 0; i < Math.min(botHand.length,6); i++) botDiv.innerHTML += getCardHTML(null,true);

            // ręka gracza
            const ph = document.getElementById('player-hand');
            ph.innerHTML = '';
            playerHand.forEach((c,i) => {
                const el = document.createElement('div');
                el.innerHTML = getCardHTML(c);
                el.onclick = () => handlePlayerCardClick(i);
                ph.appendChild(el);
            });

            // stół
            const pairsDiv = document.getElementById('table-pairs');
            pairsDiv.innerHTML = '';
            tablePairs.forEach((pair,i) => {
                const p = document.createElement('div');
                p.className = `pair ${selectedPairIndex===i?'selected':''}`;
                p.innerHTML = `
                    <div class="pair-label">ATAK</div>${getCardHTML(pair.attack)}
                    <div class="pair-label">OBRONA</div>${pair.defense ? getCardHTML(pair.defense) : '<div style="width:70px;height:100px;border:2px dashed #ffcc00;border-radius:8px;"></div>'}
                `;
                if (!isPlayerAttacker && !pair.defense) p.onclick = () => { selectedPairIndex = i; render(); };
                pairsDiv.appendChild(p);
            });

            updateButtonsAndStatus();
        }

        function updateButtonsAndStatus() {
            const status = document.getElementById('status');
            const btnDiv = document.getElementById('action-buttons');
            btnDiv.innerHTML = '';

            const allBeaten = tablePairs.length > 0 && tablePairs.every(p => p.defense !== null);
            const canAdd = tablePairs.length < maxAttackCards && tablePairs.length < (isPlayerAttacker ? botHand.length : playerHand.length);

            if (isPlayerAttacker) {
                status.textContent = tablePairs.length === 0 
                    ? 'Zagraj pierwszą kartę ataku' 
                    : allBeaten 
                        ? 'Bot się wybronił! Możesz dorzucić jeszcze figury lub zakończyć atak' 
                        : 'Możesz dorzucić karty o tych samych rangach lub przekazać do obrony';
                
                // przycisk zakończenia ataku (zawsze dostępny gdy coś leży)
                if (tablePairs.length > 0) {
                    const endBtn = document.createElement('button');
                    endBtn.textContent = 'ZAKOŃCZ ATAK';
                    endBtn.onclick = endPlayerAttack;
                    btnDiv.appendChild(endBtn);
                }
            } else {
                // gracz broni
                status.textContent = tablePairs.some(p => !p.defense) 
                    ? `Bot atakuje! Wybierz atak na stole → potem swoją kartę obrony`
                    : 'Wszystko zbite – czekam na decyzję bota...';
                
                const takeBtn = document.createElement('button');
                takeBtn.textContent = 'WEŹ KARTY (PAS)';
                takeBtn.onclick = playerTakeCards;
                btnDiv.appendChild(takeBtn);
            }
        }

        function handlePlayerCardClick(index) {
            if (gameOver) return;
            const card = playerHand[index];

            if (isPlayerAttacker) {
                // atak gracza – pierwsza lub dorzutka
                const existingRanks = new Set(tablePairs.map(p => p.attack.rank));
                if (tablePairs.length === 0 || existingRanks.has(card.rank)) {
                    if (tablePairs.length < maxAttackCards) {
                        tablePairs.push({attack: card, defense: null});
                        playerHand.splice(index, 1);
                        render();
                    }
                } else {
                    alert("❌ Tylko karty o rangach już leżących na stole!");
                }
            } else {
                // obrona gracza
                if (selectedPairIndex === -1) {
                    alert("Kliknij najpierw kartę ATAKU na stole, którą chcesz zbić!");
                    return;
                }
                const pair = tablePairs[selectedPairIndex];
                if (canBeat(pair.attack, card)) {
                    pair.defense = card;
                    playerHand.splice(index, 1);
                    selectedPairIndex = -1;
                    render();

                    // jeśli wszystko zbite – bot może kontynuować atak
                    if (tablePairs.every(p => p.defense)) {
                        setTimeout(botContinueAfterDefense, 800);
                    }
                } else {
                    alert("❌ Ta karta nie bije ataku!");
                }
            }
        }

        function endPlayerAttack() {
            // atakujący (gracz) kończy – odrzucamy stół i tura przechodzi na bota
            discardTable();
            isPlayerAttacker = false;
            render();
            setTimeout(botStartAttack, 700);
        }

        function botDefend() {
            document.getElementById('status').textContent = 'Bot się broni...';
            setTimeout(() => botDefendStep(0), 600);
        }

        function botDefendStep(step) {
            const open = tablePairs.filter(p => !p.defense);
            if (open.length === 0) {
                render();
                return; // wszystko zbite – gracz może kontynuować
            }

            let candidates = [];
            for (let i = 0; i < tablePairs.length; i++) {
                if (!tablePairs[i].defense) {
                    const poss = botHand.filter(c => canBeat(tablePairs[i].attack, c));
                    if (poss.length) candidates.push({idx: i, cards: poss});
                }
            }

            if (candidates.length === 0) {
                // bot nie może – bierze wszystko
                botTakeCards();
                return;
            }

            // najsłabsza możliwa obrona
            candidates.sort((a,b) => rankValues[a.cards[0].rank] - rankValues[b.cards[0].rank]);
            const best = candidates[0];
            const beater = best.cards[0];
            tablePairs[best.idx].defense = beater;
            botHand.splice(botHand.indexOf(beater), 1);

            render();
            setTimeout(() => botDefendStep(step+1), 650);
        }

        function botTakeCards() {
            document.getElementById('status').textContent = 'Bot nie może bić – bierze karty!';
            
            tablePairs.forEach(p => {
                botHand.push(p.attack);
                if (p.defense) botHand.push(p.defense);
            });

            // dorzutka od gracza (atakującego)
            const throwRanks = new Set(tablePairs.map(p => p.attack.rank));
            for (let i = playerHand.length-1; i >= 0; i--) {
                if (throwRanks.has(playerHand[i].rank)) {
                    botHand.push(playerHand[i]);
                    playerHand.splice(i,1);
                }
            }

            clearTable();
            isPlayerAttacker = false; // po wzięciu tura przechodzi na bota jako atakującego? Nie – w 2-osobowym po wzięciu atakujący kontynuuje? 
            // według zasad: po wzięciu obrońca traci turę, atakujący staje się obrońcą? W prostym 2-osobowym – po wzięciu karty atakujący kończy atak i obrońca staje się atakującym
            isPlayerAttacker = true; // gracz znowu atakuje (standard w większości implementacji 2-osobowych)
            render();
            checkWin();
        }

        function playerTakeCards() {
            document.getElementById('status').textContent = 'Bierzesz karty...';
            
            tablePairs.forEach(p => {
                playerHand.push(p.attack);
                if (p.defense) playerHand.push(p.defense);
            });

            const throwRanks = new Set(tablePairs.map(p => p.attack.rank));
            for (let i = botHand.length-1; i >= 0; i--) {
                if (throwRanks.has(botHand[i].rank)) {
                    playerHand.push(botHand[i]);
                    botHand.splice(i,1);
                }
            }

            clearTable();
            isPlayerAttacker = false; // po wzięciu przez gracza – bot zaczyna atak
            render();
            setTimeout(botStartAttack, 800);
            checkWin();
        }

        function botContinueAfterDefense() {
            // bot (atakujący) może dorzucić jeszcze kilka figur po udanej obronie gracza
            const currentRanks = new Set(tablePairs.map(p => p.attack.rank));
            let toAdd = Math.min(2, botHand.length, maxAttackCards - tablePairs.length);
            
            function addBotCard() {
                if (toAdd <= 0) {
                    // bot kończy atak
                    setTimeout(() => {
                        discardTable();
                        isPlayerAttacker = true; // gracz teraz atakuje
                        render();
                    }, 800);
                    return;
                }

                let possible = botHand.filter(c => currentRanks.has(c.rank));
                if (possible.length === 0) possible = botHand; // gdyby coś poszło nie tak

                possible.sort((a,b) => rankValues[a.rank] - rankValues[b.rank]);
                const chosen = possible[0];
                const idx = botHand.indexOf(chosen);

                tablePairs.push({attack: chosen, defense: null});
                botHand.splice(idx, 1);

                render();
                toAdd--;
                setTimeout(addBotCard, 750);
            }
            
            if (toAdd > 0) {
                document.getElementById('status').textContent = 'Bot dorzuca jeszcze karty...';
                addBotCard();
            } else {
                discardTable();
                isPlayerAttacker = true;
                render();
            }
        }

        function botStartAttack() {
            if (gameOver) return;
            document.getElementById('status').textContent = 'Bot atakuje...';

            const currentRanks = new Set();
            let added = 0;
            const maxAdd = Math.min(4, botHand.length, playerHand.length || 6);

            function addOneBotAttack() {
                if (added >= maxAdd || botHand.length === 0) {
                    isPlayerAttacker = false;
                    render();
                    setTimeout(botDefend, 600);
                    return;
                }

                let possible = botHand.filter(c => tablePairs.length === 0 || currentRanks.has(c.rank));
                if (possible.length === 0) possible = botHand;

                possible.sort((a,b) => rankValues[a.rank] - rankValues[b.rank]);
                const chosen = possible[0];
                const idx = botHand.indexOf(chosen);

                tablePairs.push({attack: chosen, defense: null});
                botHand.splice(idx, 1);
                currentRanks.add(chosen.rank);

                render();
                added++;
                setTimeout(addOneBotAttack, 700);
            }

            addOneBotAttack();
        }

        function discardTable() {
            tablePairs = [];
        }

        function clearTable() {
            tablePairs = [];
        }

        function performDraw() {
            const attackerHand = isPlayerAttacker ? playerHand : botHand;
            const defenderHand = isPlayerAttacker ? botHand : playerHand;
            if (deck.length && attackerHand.length < 6) attackerHand.push(deck.shift());
            if (deck.length && defenderHand.length < 6) defenderHand.push(deck.shift());
        }

        function checkWin() {
            if (playerHand.length === 0) {
                gameOver = true;
                showWinScreen("🎉 WYGRALES! Jesteś mistrzem Durnia! 🎉");
            } else if (botHand.length === 0) {
                gameOver = true;
                showWinScreen("😭 BOT WYGRAŁ<br>Jesteś DURNIOW! 😭");
            }
        }

        function showWinScreen(text) {
            document.getElementById('win-text').innerHTML = text;
            document.getElementById('win-screen').style.display = 'flex';
        }

        function startGame() {
            createDeck();
            tablePairs = [];
            selectedPairIndex = -1;
            isPlayerAttacker = true;
            gameOver = false;
            document.getElementById('win-screen').style.display = 'none';
            render();
        }

        function restartGame() {
            startGame();
        }

        window.onload = startGame;
    </script>
</body>
</html>
