<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Symulator Sejmu 460</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>System Zarządzania Ławami Poselskimi</h1>

    <div id="parliament-canvas"></div>

    <div id="legend"></div>

    <div id="controls">
        <input type="text" id="pName" placeholder="Nazwa partii">
        <input type="number" id="pSeats" placeholder="Liczba miejsc" style="width: 100px;">
        <input type="color" id="pColor" value="#3498db">
        <button onclick="addParty()" style="background: #27ae60; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer;">Dodaj do Parlamentu</button>
        <button onclick="clearAll()" style="background: #e74c3c; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer;">Wyczyść salę</button>
    </div>

    <script src="script.js">
</body>
</html>
