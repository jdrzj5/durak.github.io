<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mini Kings</title>

<style>

body{
background:#1a1a1a;
color:white;
font-family:serif;
text-align:center;
}

#panel{
margin:auto;
width:600px;
padding:20px;
background:#2b2b2b;
border:3px solid gold;
}

button{
padding:10px;
margin:5px;
background:#444;
color:white;
border:1px solid gold;
cursor:pointer;
}

button:hover{
background:#666;
}

</style>
</head>

<body>

<h1>Dynasty Simulator</h1>

<div id="panel">

<p id="year"></p>

<p>Władca: <span id="ruler"></span></p>
<p>Złoto: <span id="gold"></span></p>
<p>Armia: <span id="army"></span></p>
<p>Prestiż: <span id="prestige"></span></p>

<hr>

<p id="event"></p>

<button onclick="tax()">Pobierz podatki</button>
<button onclick="train()">Trenuj armię</button>
<button onclick="war()">Wypowiedz wojnę</button>
<button onclick="nextTurn()">Następny rok</button>

</div>

<script>

let year = 1066;

let state = {

ruler:"Kazimierz",
gold:100,
army:50,
prestige:10

};

function update(){

document.getElementById("year").innerText="Rok "+year;
document.getElementById("ruler").innerText=state.ruler;
document.getElementById("gold").innerText=state.gold;
document.getElementById("army").innerText=state.army;
document.getElementById("prestige").innerText=state.prestige;

}

function tax(){

state.gold+=20;

document.getElementById("event").innerText=
"Chłopi zapłacili podatki.";

update();

}

function train(){

if(state.gold>=10){

state.gold-=10;
state.army+=10;

document.getElementById("event").innerText=
"Zrekrutowano nowych żołnierzy.";

}

else{

document.getElementById("event").innerText=
"Brak złota.";

}

update();

}

function war(){

let enemy = Math.floor(Math.random()*80)+20;

if(state.army>enemy){

state.prestige+=10;
state.gold+=30;

document.getElementById("event").innerText=
"Wygrana wojna!";

}

else{

state.army-=10;

document.getElementById("event").innerText=
"Przegrana bitwa.";

}

update();

}

function randomEvent(){

let r=Math.random();

if(r<0.3){

state.gold+=15;
return "Kupcy przywieźli bogactwa.";

}

if(r<0.6){

state.prestige+=5;
return "Turniej rycerski zwiększył prestiż.";

}

state.army+=5;
return "Ochotnicy dołączyli do armii.";

}

function nextTurn(){

year++;

document.getElementById("event").innerText=randomEvent();

update();

}

update();

</script>

</body>
</html>
