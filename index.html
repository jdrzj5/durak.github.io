<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dureń – Podkidnoy (teraz dokładnie tak jak chciałeś)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        body {
            margin: 0; padding: 0;
            background: #0a3d1f; color: #fff;
            font-family: 'Press Start 2P', cursive;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; flex-direction: column;
        }
        
        #game {
            width: 980px; background: #0a3d1f;
            border: 8px solid #ffcc00; border-radius: 15px;
            padding: 20px; box-shadow: 0 0 30px #ffcc00;
        }
        
        header { text-align: center; margin-bottom: 15px; }
        h1 { font-size: 28px; color: #ffcc00; text-shadow: 3px 3px #000; }
        
        .area { display: flex; justify-content: space-between; margin: 15px 0; padding: 10px; background: rgba(0,0,0,0.4); border-radius: 10px; }
        
        .card {
            width: 70px; height: 100px; background: white;
            border: 3px solid #222; border-radius: 8px;
            position: relative; display: inline-flex;
            flex-direction: column; align-items: center; justify-content: center;
            font-size: 24px; margin: 5px;
            box-shadow: 3px 3px 8px rgba(0,0,0,0.6);
            cursor: pointer; transition: all 0.3s ease;
            user-select: none;
        }
        .card:hover { transform: scale(1.15) rotate(4deg); }
        .card.red { color: #c00; } .card.black { color: #111; }
        .card .rank { position: absolute; top: 5px; left: 5px; font-size: 18px; font-weight: bold; }
        .card .suit { font-size: 42px; }
        .card .rank-bottom { position: absolute; bottom: 5px; right: 5px; font-size: 18px; font-weight: bold; transform: rotate(180deg); }
        
        .card-back {
            width: 70px; height: 100px;
            background: linear-gradient(45deg, #222, #444);
            border: 3px solid #ffcc00; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            color: #ffcc00; font-size: 30px;
            box-shadow: 3px 3px 8px rgba(0,0,0,0.6);
        }
        
        #table { background: #1a5c2f; padding: 20px; border-radius: 12px; min-height: 240px; }
        
        #table-pairs {
            display: flex; gap: 25px; flex-wrap: wrap;
            justify-content: center; margin: 15px 0;
        }
        
        .pair {
            display: flex; flex-direction: column;
            align-items: center; gap: 8px;
            background: rgba(255,255,255,0.1); padding: 10px;
            border-radius: 10px; border: 3px solid transparent;
            transition: all 0.3s;
        }
        .pair.selected { border-color: #ff0; box-shadow: 0 0 20px #ff0; }
        
        .pair-label { font-size: 12px; color: #ffcc00; }
        
        #player-hand {
            display: flex; flex-wrap: wrap; justify-content: center;
            gap: 8px; margin-top: 10px; padding: 15px;
            background: rgba(0,0,0,0.5); border-radius: 12px;
        }
        
        .info { font-size: 16px; text-align: center; margin: 10px 0; }
        
        button {
            background: #ffcc00; color: #000; border: none;
            padding: 12px 24px; font-family: 'Press Start 2P', cursive;
            font-size: 16px; cursor: pointer; margin: 8px;
            border-radius: 6px; box-shadow: 3px 3px #000;
        }
        button:hover { background: #ffdd33; }
        
        #status {
            font-size: 20px; color: #ffcc00;
            text-align: center; min-height: 40px;
            text-shadow: 2px 2px #000; margin: 10px 0;
        }
        
        .win {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.9);
            display: none; align-items: center; justify-content: center;
            flex-direction: column; font-size: 42px; color: #ffcc00; z-index: 100;
        }
    </style>
</head>
<body>
    <div id="game">
        <header>
            <h1>♦ DUREŃ (PODKIDNOY) ♦</h1>
            <p>Teraz dokładnie tak jak chciałeś – bot reaguje OD RAZU</p>
        </header>

        <div class="area">
            <div id="trump-area"><span>ATUT:</span><div id="trump-card" class="card"></div></div>
            <div id="deck-area"><span>TALIA: <span id="deck-count">24</span></span><div class="card-back">🂠</div></div>
        </div>

        <div class="info"><strong>BOT ma <span id="bot-count">6</span> kart</strong></div>
        <div style="text-align:center; margin:10px;"><div id="bot-hand" style="display:flex; justify-content:center; gap:5px;"></div></div>

        <div id="table">
            <div id="status">Twoja tura – kliknij kartę z ręki (dowolną)</div>
            <div id="table-pairs"></div>
        </div>

        <div id="player-hand"></div>

        <div style="text-align:center;" id="action-buttons"></div>
    </div>

    <div id="win-screen" class="win">
        <div id="win-text"></div>
        <button onclick="restartGame()" style="margin-top:30px; padding:15px 40px; font-size:20px;">JESZCZE RAZ</button>
    </div>

    <script>
        const ranks = ['6','7','8','9','10','J','Q','K','A'];
        const suits = ['♥','♦','♣','♠'];
        const rankValues = {'6':0,'7':1,'8':2,'9':3,'10':4,'J':5,'Q':6,'K':7,'A':8};

        let deck = [], playerHand = [], botHand = [];
        let trumpCard = null, trumpSuit = '';
        let tablePairs = [];
        let isPlayerAttacker = true;
        let gameOver = false;
        let selectedPairIndex = -1;

        function createDeck() {
            deck = [];
            for (let suit of suits) for (let rank of ranks) deck.push({rank, suit});
            shuffle(deck);
            playerHand = deck.splice(0, 6);
            botHand = deck.splice(0, 6);
            trumpCard = deck.pop();
            trumpSuit = trumpCard.suit;
            deck.push(trumpCard);
        }

        function shuffle(array) {
            for (let i = array.length-1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function canBeat(attack, defense) {
            if (!attack || !defense) return false;
            if (attack.suit === defense.suit) return rankValues[defense.rank] > rankValues[attack.rank];
            return defense.suit === trumpSuit && (attack.suit !== trumpSuit || rankValues[defense.rank] > rankValues[attack.rank]);
        }

        function getCardHTML(card, isBack = false) {
            if (isBack) return `<div class="card-back">🂠</div>`;
            const color = (card.suit === '♥' || card.suit === '♦') ? 'red' : 'black';
            return `<div class="card ${color}"><div class="rank">${card.rank}</div><div class="suit">${card.suit}</div><div class="rank-bottom">${card.rank}</div></div>`;
        }

        function getTableRanks() {
            const set = new Set();
            tablePairs.forEach(p => {
                set.add(p.attack.rank);
                if (p.defense) set.add(p.defense.rank);
            });
            return set;
        }

        function render() {
            if (gameOver) return;

            document.getElementById('trump-card').innerHTML = getCardHTML(trumpCard);
            document.getElementById('deck-count').textContent = deck.length;
            document.getElementById('bot-count').textContent = botHand.length;

            const botDiv = document.getElementById('bot-hand');
            botDiv.innerHTML = '';
            for (let i = 0; i < Math.min(botHand.length, 6); i++) botDiv.innerHTML += getCardHTML(null, true);

            const ph = document.getElementById('player-hand');
            ph.innerHTML = '';
            playerHand.forEach((c, i) => {
                const el = document.createElement('div');
                el.innerHTML = getCardHTML(c);
                el.onclick = () => handlePlayerCardClick(i);
                ph.appendChild(el);
            });

            const pairsDiv = document.getElementById('table-pairs');
            pairsDiv.innerHTML = '';
            tablePairs.forEach((pair, i) => {
                const p = document.createElement('div');
                p.className = `pair ${selectedPairIndex === i ? 'selected' : ''}`;
                p.innerHTML = `
                    <div class="pair-label">ATAK</div>${getCardHTML(pair.attack)}
                    <div class="pair-label">OBRONA</div>${pair.defense ? getCardHTML(pair.defense) : '<div style="width:70px;height:100px;border:2px dashed #ffcc00;border-radius:8px;"></div>'}
                `;
                if (!isPlayerAttacker && !pair.defense) p.onclick = () => { selectedPairIndex = i; render(); };
                pairsDiv.appendChild(p);
            });

            updateButtonsAndStatus();
        }

        function updateButtonsAndStatus() {
            const status = document.getElementById('status');
            const btnDiv = document.getElementById('action-buttons');
            btnDiv.innerHTML = '';

            if (isPlayerAttacker) {
                if (tablePairs.length === 0) {
                    status.textContent = 'Twoja tura – kliknij kartę z ręki (dowolną)';
                } else if (tablePairs.every(p => p.defense !== null)) {
                    status.textContent = 'Bot obronił wszystko! Dorzuć więcej kart lub zakończ atak';
                    const endBtn = document.createElement('button');
                    endBtn.textContent = 'ZAKOŃCZ ATAK';
                    endBtn.onclick = endPlayerAttack;
                    btnDiv.appendChild(endBtn);
                } else {
                    status.textContent = 'Bot nie mógł zbić – możesz dorzucić jeszcze karty lub dać mu wszystko';
                }
            } else {
                status.textContent = tablePairs.some(p => !p.defense) 
                    ? 'Bot atakuje! Kliknij kartę ATAKU na stole → potem swoją kartę obrony'
                    : 'Wszystko zbite – czekam na decyzję bota...';
                
                const pasBtn = document.createElement('button');
                pasBtn.textContent = 'PAS – WEŹ KARTY';
                pasBtn.onclick = playerTakeCards;
                btnDiv.appendChild(pasBtn);
            }
        }

        function handlePlayerCardClick(index) {
            if (gameOver) return;
            const card = playerHand[index];
            const tableRanks = getTableRanks();

            if (isPlayerAttacker) {
                if (tablePairs.length === 0 || tableRanks.has(card.rank)) {
                    tablePairs.push({attack: card, defense: null});
                    playerHand.splice(index, 1);
                    render();

                    // <<< BOT REAGUJE OD RAZU >>>
                    setTimeout(() => botDefendStep(0), 380);
                } else {
                    alert("❌ Tylko karty o rangach już leżących na stole!");
                }
            } else {
                if (selectedPairIndex === -1) {
                    alert("Najpierw kliknij kartę ATAKU na stole!");
                    return;
                }
                const pair = tablePairs[selectedPairIndex];
                if (canBeat(pair.attack, card)) {
                    pair.defense = card;
                    playerHand.splice(index, 1);
                    selectedPairIndex = -1;
                    render();

                    if (tablePairs.every(p => p.defense !== null)) {
                        setTimeout(successfulPlayerDefense, 400);
                    }
                } else {
                    alert("❌ Ta karta nie bije ataku!");
                }
            }
        }

        function botDefendStep(step) {
            const openPairs = tablePairs.filter(p => !p.defense);
            if (openPairs.length === 0) {
                render();
                return;
            }

            let candidates = [];
            for (let i = 0; i < tablePairs.length; i++) {
                if (!tablePairs[i].defense) {
                    const poss = botHand.filter(c => canBeat(tablePairs[i].attack, c));
                    if (poss.length > 0) candidates.push({idx: i, cards: poss});
                }
            }

            if (candidates.length === 0) {
                botCannotDefend();
                return;
            }

            candidates.sort((a,b) => rankValues[a.cards[0].rank] - rankValues[b.cards[0].rank]);
            const best = candidates[0];
            const beater = best.cards[0];
            tablePairs[best.idx].defense = beater;
            botHand.splice(botHand.indexOf(beater), 1);

            render();
            setTimeout(() => botDefendStep(step + 1), 450);
        }

        function botCannotDefend() {
            document.getElementById('status').textContent = 'Bot nie może zbić! Dorzuć jeszcze karty lub kliknij DAJ KARTY BOTOWI';
            const btnDiv = document.getElementById('action-buttons');
            btnDiv.innerHTML = '';
            const giveBtn = document.createElement('button');
            giveBtn.textContent = 'DAJ KARTY BOTOWI';
            giveBtn.onclick = botTakeCards;
            btnDiv.appendChild(giveBtn);
        }

        function botTakeCards() {
            const throwRanks = getTableRanks();
            for (let i = playerHand.length - 1; i >= 0; i--) {
                if (throwRanks.has(playerHand[i].rank)) {
                    tablePairs.push({attack: playerHand[i], defense: null});
                    playerHand.splice(i, 1);
                }
            }

            tablePairs.forEach(p => {
                botHand.push(p.attack);
                if (p.defense) botHand.push(p.defense);
            });

            document.getElementById('status').textContent = 'Bot wziął karty – Twoja tura dalej!';
            clearTable();
            render();
            performDraw();
            checkWin();
        }

        function endPlayerAttack() {
            clearTable();
            isPlayerAttacker = false;
            render();
            setTimeout(botStartAttack, 600);
        }

        function botStartAttack() {
            if (gameOver) return;
            document.getElementById('status').textContent = 'Bot atakuje...';
            tablePairs = [];

            const maxAdd = Math.min(3, botHand.length);
            let added = 0;

            function addBotCard() {
                if (added >= maxAdd || botHand.length === 0) {
                    isPlayerAttacker = false;
                    render();
                    return;
                }
                const tableRanks = getTableRanks();
                let possible = botHand.filter(c => tablePairs.length === 0 || tableRanks.has(c.rank));
                if (possible.length === 0) possible = botHand;

                possible.sort((a,b) => rankValues[a.rank] - rankValues[b.rank]);
                const chosen = possible[0];
                tablePairs.push({attack: chosen, defense: null});
                botHand.splice(botHand.indexOf(chosen), 1);

                render();
                added++;
                setTimeout(addBotCard, 500);
            }
            addBotCard();
        }

        function successfulPlayerDefense() {
            document.getElementById('status').textContent = 'Wszystko zbite! Ty wygrałeś bitwę – teraz TY ATAKUJESZ';
            clearTable();
            isPlayerAttacker = true;
            render();
            performDraw();
            checkWin();
        }

        function playerTakeCards() {
            document.getElementById('status').textContent = 'Bierzesz karty...';
            
            const throwRanks = getTableRanks();
            for (let i = botHand.length - 1; i >= 0; i--) {
                if (throwRanks.has(botHand[i].rank)) {
                    tablePairs.push({attack: botHand[i], defense: null});
                    botHand.splice(i, 1);
                }
            }

            tablePairs.forEach(p => {
                playerHand.push(p.attack);
                if (p.defense) playerHand.push(p.defense);
            });

            clearTable();
            isPlayerAttacker = false;
            render();
            performDraw();
            checkWin();
        }

        function clearTable() { tablePairs = []; }

        function performDraw() {
            const attacker = isPlayerAttacker ? playerHand : botHand;
            const defender = isPlayerAttacker ? botHand : playerHand;
            if (deck.length > 0 && attacker.length < 6) attacker.push(deck.shift());
            if (deck.length > 0 && defender.length < 6) defender.push(deck.shift());
        }

        function checkWin() {
            if (playerHand.length === 0) {
                gameOver = true;
                showWinScreen("🎉 WYGRALES! Jesteś mistrzem Durnia! 🎉");
            } else if (botHand.length === 0) {
                gameOver = true;
                showWinScreen("😭 BOT WYGRAŁ<br>Jesteś DURNIOW! 😭");
            }
        }

        function showWinScreen(text) {
            document.getElementById('win-text').innerHTML = text;
            document.getElementById('win-screen').style.display = 'flex';
        }

        function startGame() {
            createDeck();
            tablePairs = [];
            selectedPairIndex = -1;
            isPlayerAttacker = true;
            gameOver = false;
            document.getElementById('win-screen').style.display = 'none';
            render();
        }

        function restartGame() {
            startGame();
        }

        window.onload = startGame;
    </script>
</body>
</html>
